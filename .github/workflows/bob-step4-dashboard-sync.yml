name: BOB STEP 4 - Dashboard Sync

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard.json'
  workflow_dispatch:  # Manual trigger for testing

env:
  PYTHON_VERSION: '3.11'

jobs:
  validate-metrics:
    name: Pre-Merge Metric Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Validate dashboard metrics exist
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
        run: |
          python -c "
          import json
          import sys
          from datadog_integration import DatadogClient
          
          # Load dashboard.json
          with open('dashboard.json', 'r') as f:
              dashboard = json.load(f)
          
          # Extract metrics
          metrics = []
          for widget in dashboard.get('widgets', []):
              if 'definition' in widget:
                  for query in widget['definition'].get('requests', []):
                      if 'q' in query:
                          metrics.append(query['q'])
          
          # Validate each metric exists in Datadog
          client = DatadogClient()
          missing = []
          for metric in metrics:
              if not client.metric_exists(metric):
                  missing.append(metric)
          
          if missing:
              print(f'❌ Missing metrics: {missing}')
              sys.exit(1)
          else:
              print('✅ All metrics validated')
          "

  publish-dashboard:
    name: Publish Dashboard to Datadog
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Publish dashboard to Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
        run: |
          python -c "
          import json
          from datadog_integration import DatadogClient
          
          # Load dashboard.json
          with open('dashboard.json', 'r') as f:
              dashboard = json.load(f)
          
          # Publish to Datadog
          client = DatadogClient()
          result = client.create_or_update_dashboard(dashboard)
          
          print(f'✅ Dashboard published: {result[\"url\"]}')
          "
      
      - name: Create summary
        run: |
          echo "## 📊 BOB STEP 4 - Dashboard Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dashboard successfully published to Datadog" >> $GITHUB_STEP_SUMMARY

# Made with Bob
