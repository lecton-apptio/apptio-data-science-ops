name: BOB - Full Protocol Execution

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC (10:00 Dublin)

env:
  PYTHON_VERSION: '3.11'

jobs:
  step1-inventory:
    name: STEP 1 - Environment Inventory
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run BOB STEP 1
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          APPTIO_OPENTOKEN: ${{ secrets.APPTIO_OPENTOKEN }}
          APPTIO_ENVIRONMENT_ID: ${{ secrets.APPTIO_ENVIRONMENT_ID }}
        run: |
          python bob_inventory.py
      
      - name: Upload inventory report
        uses: actions/upload-artifact@v4
        with:
          name: step1-inventory-${{ github.run_number }}
          path: |
            bob_inventory_report.json
            bob_inventory_report.md
          retention-days: 90

  step2-precondition-gate:
    name: STEP 2 - System Precondition Gate
    runs-on: ubuntu-latest
    needs: step1-inventory
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run BOB STEP 2
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          APPTIO_OPENTOKEN: ${{ secrets.APPTIO_OPENTOKEN }}
          APPTIO_ENVIRONMENT_ID: ${{ secrets.APPTIO_ENVIRONMENT_ID }}
        run: |
          python bob_step2.py
      
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: step2-validation-${{ github.run_number }}
          path: |
            bob_validation_report.json
            bob_validation_report.md
          retention-days: 90

  step3-weekly-summary:
    name: STEP 3 - Weekly Confluence Summary
    runs-on: ubuntu-latest
    needs: step2-precondition-gate
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run BOB STEP 3
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          APPTIO_OPENTOKEN: ${{ secrets.APPTIO_OPENTOKEN }}
          APPTIO_ENVIRONMENT_ID: ${{ secrets.APPTIO_ENVIRONMENT_ID }}
        run: |
          python bob_step3.py
      
      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: step3-summary-${{ github.run_number }}
          path: |
            weekly_summary_*.md
            weekly_summary_*.json
          retention-days: 90

  step4-dashboard-sync:
    name: STEP 4 - Dashboard Sync
    runs-on: ubuntu-latest
    needs: step3-weekly-summary
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Generate Dashboard
        run: |
          python -m dashboard.generate
      
      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: step4-dashboard-${{ github.run_number }}
          path: dashboard.json
          retention-days: 90

  summary:
    name: Protocol Summary
    runs-on: ubuntu-latest
    needs: [step1-inventory, step2-precondition-gate, step3-weekly-summary, step4-dashboard-sync]
    if: always()
    
    steps:
      - name: Create Protocol Summary
        run: |
          echo "## 🤖 BOB - Full Protocol Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| STEP 1 - Environment Inventory | ${{ needs.step1-inventory.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| STEP 2 - System Precondition Gate | ${{ needs.step2-precondition-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| STEP 3 - Weekly Confluence Summary | ${{ needs.step3-weekly-summary.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| STEP 4 - Dashboard Sync | ${{ needs.step4-dashboard-sync.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ BOB protocol execution complete" >> $GITHUB_STEP_SUMMARY

# Made with Bob