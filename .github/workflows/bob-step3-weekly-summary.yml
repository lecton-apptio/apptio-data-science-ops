name: BOB STEP 3 - Weekly Confluence Summary

on:
  schedule:
    - cron: '0 4 * * 2'  # Every Tuesday at 04:00 UTC (05:00 Dublin)
  workflow_dispatch:  # Manual trigger for testing

env:
  PYTHON_VERSION: '3.11'

jobs:
  weekly-summary:
    name: Weekly Confluence Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run BOB STEP 3 - Weekly Confluence Summary
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          KUBECOST_URL: ${{ secrets.KUBECOST_URL }}
          KUBECOST_API_KEY: ${{ secrets.KUBECOST_API_KEY }}
        run: |
          python bob_step3.py
      
      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-summary-${{ github.run_number }}
          path: |
            weekly_summary_*.md
            weekly_summary_*.json
          retention-days: 90
      
      - name: Create summary
        run: |
          echo "## 📊 BOB STEP 3 - Weekly Confluence Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Week Ending:** $(date -u -d 'last sunday' +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Weekly summary published to Confluence AI space" >> $GITHUB_STEP_SUMMARY

# Made with Bob
